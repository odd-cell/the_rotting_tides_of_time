<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Rotting Tides of Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="theme-start">
  <header class="site-header">
    <a href="https://startplaying.games/gm/cozy-explorer" target="_blank" rel="noopener" class="site-header-link">An Akarii's Corner Project</a>
  </header>
  <main class="welcome">
    <header class="welcome-header">
      <h1>The Rotting Tides of Time</h1>
      <p class="tagline">A choose-your-own-adventure</p>
    </header>

    <section class="welcome-intro">
      <div class="welcome-intro-text typewriter-active" id="welcome-intro-text"></div>
    </section>

    <a href="game.html" class="begin-card">
      <span class="begin-card-inner">
        <span class="begin-label">Begin</span>
        <span class="begin-sub">Enter the Fork in the Fallen Forest</span>
      </span>
    </a>

    <footer class="welcome-footer">
      <p>The Rotting Tides of Time — A whimsical dark fantasy adventure</p>
    </footer>
  </main>
  <script>
    (function () {
      var fullText = 'You are Grimshaw—a warlock bound to the Frigidlord, marked by the pink slime curse from the fight at the woodmill. Your familiar Suki rides your shoulder. Together you can blast foes with Eldritch Blast, slow decay with Chill Touch, and ward yourself with Armor of Agathys. Your mind can touch others (Awakened Mind) and your words can shatter enchantments (Dissonant Whispers). The mark on your arm can pull corruption out of living things—at a cost.\n\nThe forest around the Fallen Elder Tree is too quiet. Something is still out there. Choose where to focus—and see how the threads fall.';
      var el = document.getElementById('welcome-intro-text');
      if (!el) return;
      var speedMs = 14;
      var i = 0;
      function tick() {
        if (i >= fullText.length) {
          el.classList.remove('typewriter-active');
          return;
        }
        i += 1;
        el.textContent = fullText.slice(0, i);
        setTimeout(tick, speedMs);
      }
      tick();
    })();
  </script>
</body>
</html>
